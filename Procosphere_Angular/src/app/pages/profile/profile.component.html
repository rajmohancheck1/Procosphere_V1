<div class="max-w-4xl mx-auto space-y-6">
  <div>
    <h1 class="text-2xl font-bold mb-1">My Profile</h1>
    <p class="text-gray-600">Your account information</p>
  </div>

  <!-- Profile Card -->
  <div class="bg-white rounded-lg shadow overflow-hidden">
    <div class="bg-gradient-to-r from-blue-600 to-purple-700 h-32"></div>
    <div class="px-6 pb-6">
      <!-- Avatar -->
      <div class="relative -mt-16 mb-4">
        <div class="w-32 h-32 bg-white rounded-full flex items-center justify-center text-4xl font-bold text-blue-600 shadow-lg border-4 border-white">
          {{ initials || 'U' }}
        </div>
      </div>

      <div class="space-y-6">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">First Name</label>
            <input type="text" [value]="formData.firstName" [disabled]="true"
              class="w-full px-3 py-2 border border-gray-300 rounded-lg bg-gray-50 text-gray-700" />
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Last Name</label>
            <input type="text" [value]="formData.lastName" [disabled]="true"
              class="w-full px-3 py-2 border border-gray-300 rounded-lg bg-gray-50 text-gray-700" />
          </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1 flex items-center gap-2">
              <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
              Email
            </label>
            <input type="email" [value]="formData.email" [disabled]="true"
              class="w-full px-3 py-2 border border-gray-300 rounded-lg bg-gray-50 text-gray-700" />
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Role</label>
            <input type="text" [value]="displayRole" [disabled]="true"
              class="w-full px-3 py-2 border border-gray-300 rounded-lg bg-gray-50 text-gray-700" />
          </div>
        </div>

        <p class="text-xs text-gray-500 italic">
          Profile editing is not yet supported. Contact your administrator to update your details.
        </p>
      </div>
    </div>
  </div>

  <!-- Activity Summary -->
  <div class="bg-white rounded-lg shadow p-6">
    <h2 class="text-lg font-semibold mb-4">Activity Summary</h2>
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
      <div class="bg-blue-50 rounded-lg p-4">
        <p class="text-sm text-gray-600 mb-1">Total Orders</p>
        <p class="text-2xl font-bold text-blue-600">{{ totalOrders }}</p>
      </div>
      <div class="bg-green-50 rounded-lg p-4">
        <p class="text-sm text-gray-600 mb-1">Approved / Completed</p>
        <p class="text-2xl font-bold text-green-600">{{ approvedOrders }}</p>
      </div>
      <div class="bg-purple-50 rounded-lg p-4">
        <p class="text-sm text-gray-600 mb-1">Total Spent</p>
        <p class="text-2xl font-bold text-purple-600">${{ totalSpent.toFixed(2) }}</p>
      </div>
    </div>
  </div>
</div>
