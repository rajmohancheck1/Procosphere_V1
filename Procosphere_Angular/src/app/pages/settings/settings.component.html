<div class="max-w-4xl mx-auto space-y-6">
  <div>
    <h1 class="text-2xl font-bold mb-1">Settings</h1>
    <p class="text-gray-600">Manage your application preferences</p>
  </div>

  @if (savedMessage) {
    <div class="bg-green-50 border border-green-200 rounded-lg p-3">
      <p class="text-sm text-green-800">{{ savedMessage }}</p>
    </div>
  }

  <!-- Notification Preferences -->
  <div class="bg-white rounded-lg shadow">
    <div class="px-6 py-4 border-b border-gray-200 flex items-center gap-3">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>
      <h2 class="text-lg font-semibold">Notification Preferences</h2>
    </div>
    <div class="p-6 space-y-4">
      <label class="flex items-center justify-between">
        <div><p class="font-medium">Email Notifications</p><p class="text-sm text-gray-600">Receive notifications via email</p></div>
        <input type="checkbox" [(ngModel)]="settings.emailNotifications" class="w-5 h-5 text-blue-600 border-gray-300 rounded focus:ring-blue-500" />
      </label>
      <label class="flex items-center justify-between">
        <div><p class="font-medium">Order Updates</p><p class="text-sm text-gray-600">Get notified about order status changes</p></div>
        <input type="checkbox" [(ngModel)]="settings.orderUpdates" class="w-5 h-5 text-blue-600 border-gray-300 rounded focus:ring-blue-500" />
      </label>
      <label class="flex items-center justify-between">
        <div><p class="font-medium">Low Stock Alerts</p><p class="text-sm text-gray-600">Receive alerts when stock is low</p></div>
        <input type="checkbox" [(ngModel)]="settings.lowStockAlerts" class="w-5 h-5 text-blue-600 border-gray-300 rounded focus:ring-blue-500" />
      </label>
      <label class="flex items-center justify-between">
        <div><p class="font-medium">Delivery Alerts</p><p class="text-sm text-gray-600">Get notified about delivery updates</p></div>
        <input type="checkbox" [(ngModel)]="settings.deliveryAlerts" class="w-5 h-5 text-blue-600 border-gray-300 rounded focus:ring-blue-500" />
      </label>
      <label class="flex items-center justify-between">
        <div><p class="font-medium">Weekly Reports</p><p class="text-sm text-gray-600">Receive weekly summary reports</p></div>
        <input type="checkbox" [(ngModel)]="settings.weeklyReports" class="w-5 h-5 text-blue-600 border-gray-300 rounded focus:ring-blue-500" />
      </label>
    </div>
  </div>

  <!-- Security Settings -->
  <div class="bg-white rounded-lg shadow">
    <div class="px-6 py-4 border-b border-gray-200 flex items-center gap-3">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      <h2 class="text-lg font-semibold">Security Settings</h2>
    </div>
    <div class="p-6 space-y-4">
      <label class="flex items-center justify-between">
        <div>
          <p class="font-medium">Two-Factor Authentication</p>
          <p class="text-sm text-gray-600">Add an extra layer of security</p>
        </div>
        <input type="checkbox" [(ngModel)]="settings.twoFactorAuth"
          class="w-5 h-5 text-blue-600 border-gray-300 rounded focus:ring-blue-500" />
      </label>
      <div>
        <label class="block font-medium mb-2">Session Timeout (minutes)</label>
        <select [(ngModel)]="settings.sessionTimeout" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
          <option value="15">15 minutes</option>
          <option value="30">30 minutes</option>
          <option value="60">60 minutes</option>
          <option value="120">2 hours</option>
        </select>
      </div>
      <button class="w-full px-4 py-2 border border-gray-300 rounded-lg hover:bg-gray-50 transition-colors flex items-center justify-center gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        Change Password
      </button>
    </div>
  </div>

  <!-- Appearance -->
  <div class="bg-white rounded-lg shadow">
    <div class="px-6 py-4 border-b border-gray-200 flex items-center gap-3">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="13.5" cy="6.5" r=".5" fill="currentColor"/><circle cx="17.5" cy="10.5" r=".5" fill="currentColor"/><circle cx="8.5" cy="7.5" r=".5" fill="currentColor"/><circle cx="6.5" cy="12.5" r=".5" fill="currentColor"/><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125-.29-.289-.438-.652-.438-1.125a1.64 1.64 0 0 1 1.668-1.668h1.996c3.051 0 5.555-2.503 5.555-5.554C21.965 6.012 17.461 2 12 2z"/></svg>
      <h2 class="text-lg font-semibold">Appearance</h2>
    </div>
    <div class="p-6 space-y-4">
      <div>
        <label class="block font-medium mb-2">Theme</label>
        <div class="grid grid-cols-3 gap-3">
          @for (theme of themes; track theme) {
            <button (click)="settings.theme = theme" class="px-4 py-3 border rounded-lg capitalize transition-colors"
              [class.border-blue-500]="settings.theme === theme"
              [class.bg-blue-50]="settings.theme === theme"
              [class.text-blue-600]="settings.theme === theme"
              [class.border-gray-300]="settings.theme !== theme"
              [class.hover:bg-gray-50]="settings.theme !== theme">
              {{ theme }}
            </button>
          }
        </div>
      </div>
      <div>
        <label class="block font-medium mb-2 flex items-center gap-2">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/></svg>
          Language
        </label>
        <select [(ngModel)]="settings.language" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
          <option value="en">English</option>
          <option value="es">Spanish</option>
          <option value="fr">French</option>
          <option value="de">German</option>
        </select>
      </div>
    </div>
  </div>

  <!-- Email Preferences -->
  <div class="bg-white rounded-lg shadow">
    <div class="px-6 py-4 border-b border-gray-200 flex items-center gap-3">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
      <h2 class="text-lg font-semibold">Email Preferences</h2>
    </div>
    <div class="p-6 space-y-4">
      <div>
        <label class="block font-medium mb-2">Email Frequency</label>
        <div class="space-y-2">
          @for (freq of emailFrequencies; track freq.value) {
            <label class="flex items-center p-3 border rounded-lg cursor-pointer hover:bg-gray-50"
              [class.border-blue-500]="settings.emailFrequency === freq.value"
              [class.bg-blue-50]="settings.emailFrequency === freq.value"
              [class.border-gray-300]="settings.emailFrequency !== freq.value">
              <input type="radio" name="emailFrequency" [value]="freq.value" [(ngModel)]="settings.emailFrequency"
                class="w-4 h-4 text-blue-600 border-gray-300 focus:ring-blue-500" />
              <div class="ml-3">
                <p class="font-medium">{{ freq.label }}</p>
                <p class="text-sm text-gray-600">{{ freq.desc }}</p>
              </div>
            </label>
          }
        </div>
      </div>
    </div>
  </div>

  <!-- Action Buttons -->
  <div class="bg-white rounded-lg shadow p-6">
    <div class="flex gap-3">
      <button (click)="handleSave()" class="flex-1 px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors flex items-center justify-center gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M15.2 3a2 2 0 0 1 1.4.6l3.8 3.8a2 2 0 0 1 .6 1.4V19a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2z"/><path d="M17 21v-7a1 1 0 0 0-1-1H8a1 1 0 0 0-1 1v7"/><path d="M7 3v4a1 1 0 0 0 1 1h7"/></svg>
        Save Settings
      </button>
      <button (click)="handleReset()" class="px-6 py-3 border border-gray-300 rounded-lg hover:bg-gray-50 transition-colors">
        Reset to Default
      </button>
    </div>
  </div>
</div>
