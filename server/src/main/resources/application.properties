# ==================== Application ====================
spring.application.name=ProcureSphere
server.port=8090

# ==================== MySQL Database ====================
spring.datasource.url=jdbc:mysql://localhost:3306/procuresphere?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=root

# ==================== JPA ====================
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true

# ==================== JWT ====================
app.jwt.secret=3cfa76ef14937c1c0ea519f8fc057a80fcd04a7420f8e8bcd0a7567c272e007b
app.jwt.expiration-ms=86400000

# ==================== CORS ====================
app.cors.allowed-origins=http://localhost:3000,http://localhost:4200,http://localhost:5173

# ==================== File Uploads ====================
app.uploads.dir=uploads
app.uploads.url-prefix=/uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ==================== Logging ====================
logging.level.com.procuresphere=DEBUG
logging.level.org.springframework.security=INFO

# ==================== SpringDoc ====================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
